# NutraTenant — local development stack
#
# Port layout (Kong-enabled stack):
#   8000  Kong proxy (public edge)          | 8001  Kong Admin API (conflicts with TM — stop TM when running Kong)
#   8080  FastAPI APIGateway (internal)     | 8005  Tenent combined service (TM+TL+TI)
#   8003  TenantProvisioning               | 8001  TenantManagement (legacy, conflicts with Kong Admin)
#   8002  TenantLifecycle (legacy)          | 8004  TenantIsolation (legacy)
#   5433  Postgres  |  6379  Redis  |  5672/15672  RabbitMQ

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  kong_data:
  tempo_data:
  loki_data:
  grafana_data:

services:

  # ──────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ──────────────────────────────────────────────────────────────────

  postgres:
    container_name: backendservicekit-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  redis:
    container_name: backendservicekit-redis
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

  rabbitmq:
    container_name: backendservicekit-rabbitmq
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5

  # ──────────────────────────────────────────────────────────────────
  # APPLICATION SERVICES
  # ──────────────────────────────────────────────────────────────────

  tenant-management:
    container_name: backendservicekit-tenantmanagement
    build:
      context: ./services/TenantManagement
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ./services/TenantManagement/.env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nutratenant_tenant
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379/1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CORS_ALLOW_ORIGINS: '["http://localhost:3000","http://localhost:8000","http://localhost:8002"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  tenant-lifecycle:
    container_name: backendservicekit-tenantlifecycle
    build:
      context: ./services/TenantLifecycle
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - ./services/TenantLifecycle/.env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nutratenant_lifecycle
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379/2
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TENANT_MANAGEMENT_BASE_URL: http://tenant-management:8000
      TENANT_PROVISIONING_BASE_URL: http://tenant-provisioning:8000
      CORS_ALLOW_ORIGINS: '["http://localhost:3000","http://localhost:8000","http://localhost:8001","http://localhost:8003"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tenant-management:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  tenant-provisioning:
    container_name: backendservicekit-tenantprovisioning
    build:
      context: ./services/TenantProvisioning
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    env_file:
      - ./services/TenantProvisioning/.env.example
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nutratenant_provisioning
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379/4
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/6
      TENANT_LIFECYCLE_BASE_URL: http://tenant-lifecycle:8000
      CORS_ALLOW_ORIGINS: '["http://localhost:3000","http://localhost:8000","http://localhost:8001","http://localhost:8002"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tenant-lifecycle:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  tenant-provisioning-worker:
    container_name: backendservicekit-tenantprovisioning-worker
    build:
      context: ./services/TenantProvisioning
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks.worker.celery_app", "worker",
              "--loglevel=info", "--concurrency=4", "--queues=celery"]
    env_file:
      - ./services/TenantProvisioning/.env.example
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nutratenant_provisioning
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379/4
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/6
      TENANT_LIFECYCLE_BASE_URL: http://tenant-lifecycle:8000
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  tenant-provisioning-flower:
    container_name: backendservicekit-tenantprovisioning-flower
    build:
      context: ./services/TenantProvisioning
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks.worker.celery_app", "flower",
              "--port=5555", "--broker=amqp://guest:guest@rabbitmq:5672/"]
    ports:
      - "5556:5555"
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/6
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Tenent: combined TenantManagement + TenantLifecycle + TenantIsolation ──

  tenent:
    container_name: backendservicekit-tenent
    build:
      context: ./services/Tenent
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    env_file:
      - ./services/Tenent/.env.example
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nutratenant_tenent
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379/7
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TENANT_PROVISIONING_BASE_URL: http://tenant-provisioning:8000
      CORS_ALLOW_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
      OTEL_SERVICE_NAME: nutratenant-tenent
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      ENABLE_TRACING: "true"
      ENABLE_METRICS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Kong: DB-less declarative edge gateway ─────────────────────────────────
  # NOTE: Kong Admin API runs on 8001, which conflicts with tenant-management.
  #       Stop tenant-management before starting Kong in the same environment.

  kong:
    container_name: backendservicekit-kong
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: "1.0"
    volumes:
      - ./services/APIGateway/kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"   # Proxy (public edge — replaces FastAPI APIGateway on 8000)
      - "8001:8001"   # Admin API (internal/dev)
    networks:
      - backend
    depends_on:
      tenent:
        condition: service_healthy
      tenant-provisioning:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5
    restart: unless-stopped
    profiles:
      - kong

  api-gateway:
    container_name: backendservicekit-apigateway
    build:
      context: ./services/APIGateway
      dockerfile: Dockerfile
    ports:
      - "8080:8000"   # Moved to 8080; Kong takes 8000 as public edge
    env_file:
      - ./services/APIGateway/.env
    environment:
      ENVIRONMENT: development
      REDIS_URL: redis://redis:6379/3
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/5
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TENENT_BASE_URL: http://tenent:8000
      TENANT_PROVISIONING_BASE_URL: http://tenant-provisioning:8000
      KONG_ADMIN_URL: http://kong:8001
      CORS_ALLOW_ORIGINS: '["http://localhost:3000","http://localhost:8000","http://localhost:8005","http://localhost:8003"]'
      OTEL_SERVICE_NAME: nutratenant-api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      ENABLE_TRACING: "true"
      ENABLE_METRICS: "true"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tenent:
        condition: service_healthy
      tenant-provisioning:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  tenant-management-docs:
    container_name: backendservicekit-tenantmanagement-docs
    build:
      context: ./services/TenantManagement
      dockerfile: Dockerfile.docs
      args:
        SCOPE: public
    ports:
      - "8080:80"
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - docs

  tenant-isolation:
    container_name: backendservicekit-tenantisolation
    build:
      context: ./services/TenantIsolation
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    env_file:
      - ./services/TenantIsolation/.env.example
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nutratenant_isolation
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379/5
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TENANT_MANAGEMENT_BASE_URL: http://tenant-management:8000
      CORS_ALLOW_ORIGINS: '["http://localhost:3000","http://localhost:8000","http://localhost:8001","http://localhost:8002","http://localhost:8003"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  api-gateway-worker:
    container_name: backendservicekit-apigateway-worker
    build:
      context: ./services/APIGateway
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks.worker.celery_app", "worker",
              "--loglevel=info", "--concurrency=4", "--queues=audit,cache,webhook"]
    env_file:
      - ./services/APIGateway/.env
    environment:
      ENVIRONMENT: development
      REDIS_URL: redis://redis:6379/3
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/5
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TENENT_BASE_URL: http://tenent:8000
      TENANT_PROVISIONING_BASE_URL: http://tenant-provisioning:8000
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────
  # OBSERVABILITY STACK  (docker compose --profile observability up)
  # ──────────────────────────────────────────────────────────────────

  otel-collector:
    container_name: backendservicekit-otel-collector
    image: otel/opentelemetry-collector-contrib:0.105.0
    volumes:
      - ./services/MetricsCollection/otelcol/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (used by Kong opentelemetry plugin)
      - "8889:8889"   # Prometheus scrape endpoint
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - observability

  prometheus:
    container_name: backendservicekit-prometheus
    image: prom/prometheus:v2.53.0
    volumes:
      - ./services/MetricsCollection/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./services/MetricsCollection/prometheus/rules:/etc/prometheus/rules:ro
      - ./services/Alerting/prometheus/alerts:/etc/prometheus/alerts:ro
    ports:
      - "9090:9090"
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - observability

  tempo:
    container_name: backendservicekit-tempo
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./services/DistributedTracing/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # HTTP query API
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - observability

  loki:
    container_name: backendservicekit-loki
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./services/Logging/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - observability

  promtail:
    container_name: backendservicekit-promtail
    image: grafana/promtail:3.1.0
    volumes:
      - ./services/Logging/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      - loki
    profiles:
      - observability

  grafana:
    container_name: backendservicekit-grafana
    image: grafana/grafana:11.1.0
    volumes:
      - ./services/Monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./services/Monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./shared/observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: nutratenant
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo
      - loki
    profiles:
      - observability

  alertmanager:
    container_name: backendservicekit-alertmanager
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./services/Alerting/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - observability
