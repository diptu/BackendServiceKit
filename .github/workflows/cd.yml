name: CD Pipeline

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        # Add your services here as you build them out.
        # Format: folder_name must match the actual directory casing under services/.
        service: [IAM, TenantManagement]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Construct valid lowercase strings for the registry tags
      - name: Set Lowercase Image Names
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SERVICE_LOWER=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          
          echo "IMAGE_PREFIX=${REPO_LOWER}" >> $GITHUB_ENV
          echo "SERVICE_NAME_LOWER=${SERVICE_LOWER}" >> $GITHUB_ENV

      - name: Build & Push
        run: |
          # Use the normalized lowercase service name for the image tag
          IMAGE_TAG_LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ env.SERVICE_NAME_LOWER }}:latest"
          IMAGE_TAG_SHA="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ env.SERVICE_NAME_LOWER }}:${{ github.sha }}"

          # Build from the specific service directory context where its Dockerfile lives
          docker build \
            -f "services/${{ matrix.service }}/Dockerfile" \
            -t "$IMAGE_TAG_LATEST" \
            -t "$IMAGE_TAG_SHA" \
            ./services/${{ matrix.service }}

          docker push "$IMAGE_TAG_LATEST"
          docker push "$IMAGE_TAG_SHA"