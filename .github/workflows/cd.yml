name: CD Pipeline

on:
  push:
    branches: [main,feature/test-pipeline]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # service: [iam, payment, search, notification, analytics]
        service: [iam]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step to dynamically construct a lowercase image prefix safely
      - name: Set Lowercase Image Prefix
        run: |
          IMAGE_PREFIX_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=${IMAGE_PREFIX_LOWER}" >> $GITHUB_ENV

      - name: Build & Push
        run: |
          IMAGE_TAG_LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest"
          IMAGE_TAG_SHA="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}"

          docker build \
            -f Dockerfile.service \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            --build-arg SERVICE_PATH=services/${{ matrix.service }} \
            -t "$IMAGE_TAG_LATEST" \
            -t "$IMAGE_TAG_SHA" \
            .

          docker push "$IMAGE_TAG_LATEST"
          docker push "$IMAGE_TAG_SHA"