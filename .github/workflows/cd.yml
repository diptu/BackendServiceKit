name: CD Pipeline

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # service: [iam, payment, search, notification, analytics]
        service: [iam]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        run: |
          docker build \
            -f Dockerfile.service \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            --build-arg SERVICE_PATH=services/${{ matrix.service }} \
            -t ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest \
            -t ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }} \
            .

          docker push ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          docker push ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}

