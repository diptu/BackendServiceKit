# Grafana server configuration for NutraTenant

[server]
http_port = 3000
root_url = http://localhost:3000/
enable_gzip = true

[security]
admin_user = ${GF_SECURITY_ADMIN_USER:admin}
admin_password = ${GF_SECURITY_ADMIN_PASSWORD:nutratenant}
disable_gravatar = true
cookie_samesite = strict

[auth]
disable_login_form = false

[auth.anonymous]
enabled = false

[users]
allow_sign_up = false
default_theme = dark

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/service_overview.json

[log]
mode = console
level = warn

[alerting]
enabled = true

[unified_alerting]
enabled = true

[feature_toggles]
enable = tempoSearch tempoServiceGraph traceqlEditor traceToMetrics

[plugins]
allow_loading_unsigned_plugins = grafana-piechart-panel

[analytics]
reporting_enabled = false
check_for_updates = false
