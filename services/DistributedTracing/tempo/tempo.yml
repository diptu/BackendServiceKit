# Grafana Tempo — distributed trace backend for NutraTenant
# Single-binary mode with filesystem storage (dev/staging)

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 72h  # 3 days retention in dev

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000

querier:
  max_concurrent_queries: 20

query_frontend:
  search:
    max_duration: 0   # no limit
  trace_by_id:
    query_shards: 50

metrics_generator:
  registry:
    external_labels:
      source: tempo
      platform: nutratenant
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  processors: [service-graphs, span-metrics]

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
